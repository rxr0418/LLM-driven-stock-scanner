name: Daily Scans

on:
  schedule:
    # Swing scan: 收盘后 LA 4:30 PM = UTC 23:30 (夏令时 UTC-7)
    - cron: '30 23 * * 1-5'
    # Day trade scan: 开盘前 LA 6:30 AM = UTC 13:30 (夏令时 UTC-7)
    - cron: '30 13 * * 1-5'
  workflow_dispatch:  # 允许手动点击触发，方便测试

jobs:
  # ── Swing scan: 收盘后跑，用当天最新收盘数据 ──────────────
  swing_scan:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 23 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run swing scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
        run: cd backend && python swing/main.py --save-db --no-llm

      - name: Backfill swing outcomes
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
        run: cd backend && python swing/update_swing_outcomes.py

  # ── Day trade scan: 开盘前跑 ──────────────────────────────
  premarket_scan:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 13 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Run premarket scan
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
        run: cd backend && python premarket/premarket_scanner.py --no-llm --save