name: Daily Scans

on:
  schedule:
    - cron: '30 23 * * 1-5'  # Swing scan: LA 4:30 PM (summer UTC-7)
    - cron: '30 13 * * 1-5'  # Day trade scan: LA 6:30 AM (summer UTC-7)
    - cron: '0 15 * * 1-5'   # Premarket outcomes: LA 8:00 AM (30min after open)
  workflow_dispatch:

jobs:
  swing_scan:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 23 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Run swing scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
        run: cd backend && python swing/main.py --save-db --no-llm
      - name: Backfill swing outcomes
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
        run: cd backend && python swing/update_swing_outcomes.py

  premarket_scan:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '30 13 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Run premarket scan
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FINNHUB_API_KEY:   ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:      ${{ secrets.SUPABASE_URL }}
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          LANGFUSE_PUBLIC_KEY:  ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY:  ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_BASE_URL:    ${{ secrets.LANGFUSE_BASE_URL }}
        run: cd backend && python premarket/premarket_scanner.py --save-db

  premarket_outcomes:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.schedule == '0 15 * * 1-5'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt
      - name: Backfill premarket outcomes
        env:
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SUPABASE_URL:    ${{ secrets.SUPABASE_URL }}
        run: cd backend && python premarket/update_premarket_outcomes.py